data_subfolders:
  day: 20250717
  experiment: 1

DJ:
  username: ssuhai
  userinfo:
    experimenter: 'closedlooptest' 
    # at what location what experimental information is stored in the file name
    animal_loc: 1
    region_loc: 2
    field_loc: 3
    stimulus_loc: 4
    cond1_loc: 5
    data_dir: /gpfs01/euler/User/ssuhai/GitRepos/simulation_closed_loop/data/recordings/first_closed_loop_experiment

  table_parameters:
    # for the DJ tables 
    PreprocessParams: # {}
      # for janes densenoise (requires 60 hz trace sampling, dont know why ...)
      fs_resample: 60

      # Below the values for spike estimation I think
      # window_length: 60  # default
      # poly_order: 3,  # default
      # non_negative: 1,  # non default
      # subtract_baseline: 0,  # non default
      # standardize: 1,  # default
    Stimulus:
      noise:
        stim_name: 'densenoise'
        stim_family: 'noise'
        pix_n_x: 20
        pix_n_y: 15
        skip_duplicates: True
        pix_scale_x_um: 40
        pix_scale_y_um: 40
        framerate: 5

    DNoiseTraceParams:
        dnoise_params_id: 1
        fupsample_trace: 20
        fupsample_stim: 4
        ref_time: 'stim'
        fit_kind: 'gradient'
        skip_duplicates: True
        pre_blur_sigma_s: 0.
        post_blur_sigma_s: 0.




paths: 
  # absolute paths: change these to your own
  repo_directory: /gpfs01/euler/User/ssuhai/GitRepos/simulation_closed_loop/
